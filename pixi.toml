# pixi project manifest — single source of truth for the XCell toolchain.
#
# Pins Python AND Node together so every contributor/user gets an identical
# environment from `pixi.lock`. See README "Quick Start" for usage.
#
#   pixi install        -> create the env (Python + Node + all deps)
#   pixi run dev        -> frontend (Vite dev server, :5173)
#   pixi run backend    -> backend  (uvicorn, :8000)

[workspace]
name = "xcell"
version = "0.1.0"
description = "Modern web app for scRNA-seq and spatial transcriptomics exploration"
channels = ["conda-forge"]
# Solved for all listed platforms at `pixi install` time. If the solve fails
# on a platform you don't use, remove it from this list.
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
# Toolchain — the whole point: Python and Node pinned in one place.
python = "3.11.*"
nodejs = "20.*"
# Heavy scientific stack from conda-forge (compiled wheels, geo/graph libs).
# The editable `xcell` package below declares these too; pixi recognizes the
# conda installs as satisfying its requirements, so they are not re-fetched.
scanpy = ">=1.9"
squidpy = ">=1.3"
anndata = ">=0.10"
numpy = ">=1.24"
pandas = ">=2.0"
pyyaml = ">=6.0"
# Leiden clustering (/scanpy/leiden) needs leidenalg; not a hard scanpy dep.
leidenalg = "*"
python-igraph = "*"

[pypi-dependencies]
# The backend package, installed editable. Pulls fastapi + uvicorn[standard]
# from its own pyproject.toml.
xcell = { path = "backend", editable = true }

[tasks.install-frontend]
# `npm ci` uses the pinned Node above and respects package-lock.json.
# inputs/outputs let pixi skip this when the lockfile is unchanged.
cmd = "npm ci"
cwd = "frontend"
inputs = ["frontend/package.json", "frontend/package-lock.json"]
outputs = ["frontend/node_modules/.package-lock.json"]

[tasks.dev]
cmd = "npm run dev"
cwd = "frontend"
depends-on = ["install-frontend"]

[tasks.build]
cmd = "npm run build"
cwd = "frontend"
depends-on = ["install-frontend"]

[tasks.backend]
# cwd = backend/ so uvicorn's --reload watcher scopes to backend sources.
cmd = "uvicorn xcell.main:app --reload"
cwd = "backend"

[feature.dev.dependencies]
pytest = ">=7.0"
httpx = ">=0.25"

[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
